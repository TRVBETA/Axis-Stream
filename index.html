<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axis Stream</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e50914">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Axis Stream">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --surface3: #2a2a2a;
    --text: #e5e5e5;
    --text-dim: #777;
    --accent: #e50914;
    --accent-hover: #f6121d;
    --accent-glow: rgba(229,9,20,.25);
    --border: #222;
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background: var(--bg); color: var(--text);
    min-height:100vh; overflow-x:hidden;
  }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:3px; }

  /* ── NAV ── */
  nav {
    position:sticky; top:0; z-index:100;
    display:flex; align-items:center; gap:12px;
    padding:10px 24px;
    background:rgba(10,10,10,.94);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
  }
  .logo {
    font-size:22px; font-weight:900; letter-spacing:-.5px;
    white-space:nowrap; cursor:pointer; user-select:none;
    display:flex; align-items:center; gap:6px;
  }
  .logo .ax { color:var(--accent); }
  .logo .is { color:var(--text); }
  .nav-links { display:flex; gap:2px; margin-left:8px; }
  .nav-links button {
    background:none; border:none; color:var(--text-dim);
    font-size:13px; padding:6px 14px; border-radius:20px;
    cursor:pointer; transition:all .2s; font-weight:500;
  }
  .nav-links button:hover { color:#fff; background:var(--surface2); }
  .nav-links button.active { color:var(--accent); background:rgba(229,9,20,.1); }

  .nav-right { margin-left:auto; display:flex; align-items:center; gap:8px; }

  .btn-random {
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text); padding:8px 14px; border-radius:20px;
    font-size:13px; cursor:pointer; transition:all .2s;
    display:flex; align-items:center; gap:5px; font-weight:500;
    white-space:nowrap;
  }
  .btn-random:hover { border-color:var(--accent); color:var(--accent); }
  .btn-random.spinning .dice { animation: spin .5s ease; }
  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

  .search-box { position:relative; width:300px; }
  .search-box input {
    width:100%; padding:9px 14px 9px 36px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:20px; color:var(--text); font-size:13px;
    outline:none; transition:border .2s;
  }
  .search-box input:focus { border-color:var(--accent); }
  .search-box .si {
    position:absolute; left:12px; top:50%; transform:translateY(-50%);
    color:var(--text-dim); font-size:14px; pointer-events:none;
  }
  .search-box .cl {
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--text-dim); font-size:16px;
    cursor:pointer; display:none;
  }

  /* ── DROPDOWN ── */
  .search-dropdown {
    position:absolute; top:calc(100% + 6px); left:0; right:0;
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); max-height:440px; overflow-y:auto;
    display:none; box-shadow:0 16px 48px rgba(0,0,0,.7);
  }
  .search-dropdown.show { display:block; }
  .dd-item {
    display:flex; align-items:center; gap:12px;
    padding:10px 14px; cursor:pointer; transition:background .12s;
  }
  .dd-item:hover { background:var(--surface2); }
  .dd-item img {
    width:38px; height:57px; object-fit:cover; border-radius:4px;
    background:var(--surface2); flex-shrink:0;
  }
  .dd-item .nop {
    width:38px; height:57px; background:var(--surface2);
    border-radius:4px; display:flex; align-items:center;
    justify-content:center; color:var(--text-dim); font-size:10px; flex-shrink:0;
  }
  .dd-item .inf { flex:1; min-width:0; }
  .dd-item .tt {
    font-size:13px; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .dd-item .mt { font-size:11px; color:var(--text-dim); }
  .badge {
    font-size:9px; padding:2px 7px; border-radius:4px;
    font-weight:700; text-transform:uppercase; color:#fff; flex-shrink:0;
  }
  .badge.movie { background:var(--accent); }
  .badge.tv { background:#6366f1; }

  /* ── MAIN ── */
  main { padding:20px 24px 40px; max-width:1440px; margin:0 auto; }

  .section-head {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
  }
  .section-title {
    font-size:18px; font-weight:700;
    display:flex; align-items:center; gap:8px;
  }
  .section-title .cnt { font-size:12px; color:var(--text-dim); font-weight:400; }

  /* ── GENRE BAR ── */
  .genre-bar {
    display:flex; gap:6px; overflow-x:auto; padding-bottom:6px;
    margin-bottom:20px; scrollbar-width:none;
  }
  .genre-bar::-webkit-scrollbar { display:none; }
  .genre-chip {
    padding:7px 16px; border-radius:20px; font-size:12px;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text-dim); cursor:pointer; white-space:nowrap;
    transition:all .2s; font-weight:500;
  }
  .genre-chip:hover { color:#fff; border-color:#555; }
  .genre-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  /* ── GRID ── */
  .grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
    gap:14px; margin-bottom:36px;
  }
  .card {
    background:var(--surface); border-radius:var(--radius);
    overflow:hidden; cursor:pointer;
    transition:transform .2s,box-shadow .2s;
    position:relative;
  }
  .card:hover { transform:translateY(-4px); box-shadow:0 8px 28px rgba(0,0,0,.5); }
  .card img {
    width:100%; aspect-ratio:2/3; object-fit:cover; display:block;
    background:var(--surface2);
  }
  .card .no-img {
    width:100%; aspect-ratio:2/3; background:var(--surface2);
    display:flex; align-items:center; justify-content:center;
    color:var(--text-dim); font-size:12px;
  }
  .card .cb { padding:9px 10px; }
  .card .ct {
    font-size:12px; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .card .cm { font-size:10px; color:var(--text-dim); margin-top:2px; }
  .card .card-type {
    position:absolute; top:7px; left:7px;
    font-size:8px; padding:2px 6px; border-radius:3px;
    font-weight:700; text-transform:uppercase; color:#fff;
  }
  .card .card-type.movie { background:var(--accent); }
  .card .card-type.tv { background:#6366f1; }
  .card .rb {
    position:absolute; top:7px; right:7px;
    background:rgba(0,0,0,.75); border:none; color:#fff;
    width:24px; height:24px; border-radius:50%;
    font-size:12px; cursor:pointer; display:none;
    align-items:center; justify-content:center;
  }
  .card:hover .rb { display:flex; }
  .card .pb {
    height:3px; background:var(--surface3);
    position:absolute; bottom:0; left:0; right:0;
  }
  .card .pb .fl { height:100%; background:var(--accent); border-radius:0 2px 2px 0; }

  /* ── SCROLL ROW ── */
  .scroll-row {
    display:flex; gap:12px; overflow-x:auto;
    padding-bottom:8px; margin-bottom:36px;
    scrollbar-width:thin; scrollbar-color:var(--surface3) transparent;
  }
  .scroll-row .card { min-width:155px; flex-shrink:0; }

  /* ── PLAYER ── */
  #player-view { display:none; }
  #player-view.show { display:block; }
  .p-back {
    background:none; border:none; color:var(--text-dim);
    font-size:13px; cursor:pointer; margin-bottom:14px;
    display:flex; align-items:center; gap:5px;
    padding:4px 0; transition:color .2s;
  }
  .p-back:hover { color:#fff; }
  .p-container {
    width:100%; aspect-ratio:16/9; background:#000;
    border-radius:var(--radius-lg); overflow:hidden; margin-bottom:16px;
    box-shadow:0 4px 32px rgba(0,0,0,.6);
  }
  .p-container iframe { width:100%; height:100%; border:none; }

  .server-bar {
    display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; align-items:center;
  }
  .server-bar span { font-size:12px; color:var(--text-dim); margin-right:4px; }
  .server-btn {
    padding:6px 14px; border-radius:6px; font-size:12px;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text-dim); cursor:pointer; transition:all .2s; font-weight:500;
  }
  .server-btn:hover { border-color:#555; color:#fff; }
  .server-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(229,9,20,.08); }

  .tv-ctrl {
    display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; align-items:center;
  }
  .tv-ctrl label { font-size:12px; color:var(--text-dim); }
  .tv-ctrl select {
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text); padding:7px 12px; border-radius:6px;
    font-size:12px; outline:none; cursor:pointer;
  }
  .tv-ctrl select:focus { border-color:var(--accent); }

  .p-header { display:flex; gap:20px; margin-bottom:20px; align-items:flex-start; }
  .p-poster { width:140px; flex-shrink:0; border-radius:var(--radius); overflow:hidden; }
  .p-poster img { width:100%; display:block; }
  .p-info { flex:1; min-width:0; }
  .p-info h1 { font-size:26px; font-weight:800; margin-bottom:5px; line-height:1.2; }
  .p-info .mr {
    display:flex; gap:10px; color:var(--text-dim);
    font-size:12px; margin-bottom:8px; flex-wrap:wrap;
  }
  .p-info .ov {
    font-size:13px; color:var(--text-dim); line-height:1.6; margin-bottom:12px;
    display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden;
  }
  .p-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .btn {
    padding:8px 16px; border-radius:6px; border:none;
    font-size:12px; font-weight:600; cursor:pointer; transition:all .2s;
  }
  .btn-accent { background:var(--accent); color:#fff; }
  .btn-accent:hover { background:var(--accent-hover); }
  .btn-outline {
    background:transparent; border:1px solid var(--border); color:var(--text);
  }
  .btn-outline:hover { border-color:var(--text); }
  .btn-outline.active { border-color:var(--accent); color:var(--accent); }

  /* ── RANDOM MODAL ── */
  .modal-overlay {
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,.75); backdrop-filter:blur(6px);
    display:none; align-items:center; justify-content:center;
  }
  .modal-overlay.show { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-lg); padding:28px; width:400px; max-width:92vw;
    text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.6);
  }
  .modal h2 { font-size:20px; margin-bottom:6px; }
  .modal .sub { color:var(--text-dim); font-size:13px; margin-bottom:20px; }
  .modal .rand-poster {
    width:180px; margin:0 auto 14px; border-radius:var(--radius); overflow:hidden;
  }
  .modal .rand-poster img { width:100%; display:block; }
  .modal .rand-title { font-size:18px; font-weight:700; margin-bottom:4px; }
  .modal .rand-meta { font-size:12px; color:var(--text-dim); margin-bottom:16px; }
  .modal .rand-actions { display:flex; gap:8px; justify-content:center; }
  .modal .rand-content { min-height:200px; display:flex; align-items:center; justify-content:center; }
  .modal .spinner {
    width:36px; height:36px; border:3px solid var(--surface3);
    border-top-color:var(--accent); border-radius:50%;
    animation: sp .7s linear infinite;
  }
  @keyframes sp { to{transform:rotate(360deg)} }

  /* ── GENRE BROWSE ── */
  .load-more-wrap { text-align:center; margin-bottom:36px; }
  .btn-load-more {
    padding:10px 32px; border-radius:8px; font-size:13px;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text); cursor:pointer; transition:all .2s; font-weight:500;
  }
  .btn-load-more:hover { border-color:var(--accent); color:var(--accent); }

  /* ── EMPTY ── */
  .empty { text-align:center; padding:50px 20px; color:var(--text-dim); }
  .empty .ei { font-size:42px; margin-bottom:10px; }
  .empty p { font-size:14px; }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:20px; right:20px; z-index:300;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text); padding:10px 18px; border-radius:var(--radius);
    font-size:12px; box-shadow:0 4px 20px rgba(0,0,0,.5);
    transform:translateY(70px); opacity:0; transition:all .3s ease;
  }
  .toast.show { transform:translateY(0); opacity:1; }

  /* ── RESPONSIVE ── */
  @media(max-width:768px) {
    nav { flex-wrap:wrap; padding:10px 14px; gap:8px; }
    .search-box { width:100%; order:10; }
    .nav-right { width:100%; order:9; }
    .nav-links { margin-left:0; }
    .p-header { flex-direction:column; }
    .p-poster { width:100px; }
    .p-info h1 { font-size:20px; }
    .grid { grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; }
    .btn-random span.label { display:none; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo" onclick="goHome()"><span class="ax">AXIS</span><span class="is">STREAM</span></div>
  <div class="nav-links">
    <button id="nav-home" class="active" onclick="showPage('home')">Home</button>
    <button id="nav-genres" onclick="showPage('genres')">Genres</button>
    <button id="nav-watchlist" onclick="showPage('watchlist')">Watchlist</button>
    <button id="nav-history" onclick="showPage('history')">History</button>
  </div>
  <div class="nav-right">
    <button class="btn-random" onclick="openRandomModal()">
      <span class="dice">🎲</span><span class="label">Surprise Me</span>
    </button>
    <div class="search-box">
      <span class="si">🔍</span>
      <input type="text" id="si" placeholder="Search movies & shows..." autocomplete="off">
      <button class="cl" id="cl" onclick="clearSearch()">✕</button>
      <div class="search-dropdown" id="sd"></div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main>
  <!-- HOME -->
  <div id="page-home">
    <div class="section-head"><div class="section-title">🔥 Trending Today</div></div>
    <div class="scroll-row" id="trending-row"></div>
    <div class="section-head"><div class="section-title">🎬 Popular Movies</div></div>
    <div class="grid" id="pop-movies"></div>
    <div class="section-head"><div class="section-title">📺 Popular TV Shows</div></div>
    <div class="grid" id="pop-tv"></div>
  </div>

  <!-- GENRES -->
  <div id="page-genres" style="display:none">
    <div class="section-head"><div class="section-title">🎭 Browse by Genre</div></div>
    <div class="genre-bar" id="genre-bar"></div>
    <div class="grid" id="genre-grid"></div>
    <div class="load-more-wrap" id="load-more-wrap" style="display:none">
      <button class="btn-load-more" onclick="loadMoreGenre()">Load More</button>
    </div>
  </div>

  <!-- WATCHLIST -->
  <div id="page-watchlist" style="display:none">
    <div class="section-head"><div class="section-title">⭐ My Watchlist <span class="cnt" id="wl-cnt"></span></div></div>
    <div class="grid" id="wl-grid"></div>
    <div class="empty" id="wl-empty" style="display:none"><div class="ei">⭐</div><p>Your watchlist is empty</p></div>
  </div>

  <!-- HISTORY -->
  <div id="page-history" style="display:none">
    <div class="section-head"><div class="section-title">📜 Watch History <span class="cnt" id="hi-cnt"></span></div></div>
    <div class="grid" id="hi-grid"></div>
    <div class="empty" id="hi-empty" style="display:none"><div class="ei">📜</div><p>No watch history yet</p></div>
  </div>

  <!-- PLAYER -->
  <div id="player-view">
    <button class="p-back" onclick="closePlayer()">← Back</button>
    <div class="p-container"><iframe id="p-iframe" allowfullscreen allow="autoplay;encrypted-media"></iframe></div>
    <div class="server-bar" id="server-bar">
      <span>Server:</span>
    </div>
    <div class="tv-ctrl" id="tv-ctrl" style="display:none">
      <label>Season:</label>
      <select id="sel-s" onchange="onSeasonChange()"></select>
      <label>Episode:</label>
      <select id="sel-e" onchange="onEpisodeChange()"></select>
    </div>
    <div class="p-header">
      <div class="p-poster" id="p-poster"></div>
      <div class="p-info">
        <h1 id="p-title"></h1>
        <div class="mr" id="p-meta"></div>
        <p class="ov" id="p-ov"></p>
        <div class="p-actions">
          <button class="btn btn-accent" id="btn-wl" onclick="toggleWatchlist()">⭐ Add to Watchlist</button>
          <button class="btn btn-outline" id="btn-share" onclick="shareLink()">🔗 Copy Link</button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- RANDOM MODAL -->
<div class="modal-overlay" id="rand-modal">
  <div class="modal">
    <h2>🎲 Random Pick</h2>
    <div class="sub">Can't decide? Let fate choose.</div>
    <div class="rand-content" id="rand-content">
      <div class="spinner"></div>
    </div>
    <div class="rand-actions" id="rand-actions" style="display:none">
      <button class="btn btn-accent" id="rand-watch">▶ Watch</button>
      <button class="btn btn-outline" onclick="rollRandom()">🎲 Reroll</button>
      <button class="btn btn-outline" onclick="closeRandomModal()">✕ Close</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API_KEY='23ccfaab8635349f0ccea1a2d3c27c3c';
const B='https://api.themoviedb.org/3';
const IMG='https://image.tmdb.org/t/p/w342';
const IMG_SM='https://image.tmdb.org/t/p/w92';

// ── SERVERS (multi-source fallback) ──
const SERVERS = [
  { id:'vidking', name:'Vidking', movie:id=>`https://www.vidking.net/embed/movie/${id}?color=e50914&autoPlay=true`, tv:(id,s,e)=>`https://www.vidking.net/embed/tv/${id}/${s}/${e}?color=e50914&autoPlay=true&nextEpisode=true&episodeSelector=true` },
  { id:'vidsrc',  name:'VidSrc',  movie:id=>`https://vidsrc.icu/embed/movie/${id}`, tv:(id,s,e)=>`https://vidsrc.icu/embed/tv/${id}/${s}/${e}` },
  { id:'embed',   name:'Embed',   movie:id=>`https://multiembed.mov/?video_id=${id}&tmdb=1`, tv:(id,s,e)=>`https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}` },
];
let currentServer = SERVERS[0];

// ── GENRES ──
const GENRES_MOVIE = [
  {id:28,name:'Action'},{id:12,name:'Adventure'},{id:16,name:'Animation'},
  {id:35,name:'Comedy'},{id:80,name:'Crime'},{id:99,name:'Documentary'},
  {id:18,name:'Drama'},{id:10751,name:'Family'},{id:14,name:'Fantasy'},
  {id:36,name:'History'},{id:27,name:'Horror'},{id:10402,name:'Music'},
  {id:9648,name:'Mystery'},{id:10749,name:'Romance'},{id:878,name:'Sci-Fi'},
  {id:53,name:'Thriller'},{id:10752,name:'War'},{id:37,name:'Western'}
];
let activeGenre = null;
let genrePage = 1;

// ── STATE ──
let currentPage='home';
let prevPage='home';
let currentItem=null;
let currentSeason=1;
let currentEpisode=1;
let tvDetails=null;
let searchTimeout=null;

// ── STORAGE ──
function gs(k){try{return JSON.parse(localStorage.getItem('as_'+k))||{}}catch{return{}}}
function ss(k,v){localStorage.setItem('as_'+k,JSON.stringify(v))}
function getWL(){return gs('wl')}
function getHI(){return gs('hi')}
function getPR(){return gs('pr')}
function saveProg(id,type,pct,time,s,e){const p=getPR();p[`${type}_${id}`]={pct,time,s,e,ts:Date.now()};ss('pr',p)}
function getIProg(id,type){return getPR()[`${type}_${id}`]||null}

// ── API ──
async function tmdb(path,params={}){
  const u=new URL(B+path);u.searchParams.set('api_key',API_KEY);
  for(const[k,v]of Object.entries(params))u.searchParams.set(k,v);
  const r=await fetch(u);return r.json();
}

// ── RENDER CARD ──
function makeCard(item,opts={}){
  const type=item.media_type||item._type||'movie';
  const title=item.title||item.name||'Untitled';
  const year=(item.release_date||item.first_air_date||'').slice(0,4);
  const poster=item.poster_path;
  const rating=item.vote_average?item.vote_average.toFixed(1):'';
  const prog=getIProg(item.id,type);
  const c=document.createElement('div');c.className='card';
  c.onclick=()=>openPlayer(item,type);
  c.innerHTML=`
    ${poster?`<img src="${IMG+poster}" alt="${title}" loading="lazy">`:`<div class="no-img">No Image</div>`}
    <span class="card-type ${type}">${type==='tv'?'TV':'Movie'}</span>
    ${opts.removable?`<button class="rb" onclick="event.stopPropagation();${opts.removeAction}">✕</button>`:''}
    <div class="cb"><div class="ct" title="${title}">${title}</div><div class="cm">${year}${rating?' · ⭐'+rating:''}</div></div>
    ${prog?`<div class="pb"><div class="fl" style="width:${Math.min(prog.pct,100)}%"></div></div>`:''}`;
  return c;
}

// ── PAGES ──
function showPage(p){
  prevPage=currentPage;currentPage=p;
  ['home','genres','watchlist','history'].forEach(k=>
    document.getElementById('page-'+k).style.display=k===p?'':'none');
  document.getElementById('player-view').classList.remove('show');
  document.querySelectorAll('.nav-links button').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+p);if(nb)nb.classList.add('active');
  if(p==='watchlist')renderWL();
  if(p==='history')renderHI();
  if(p==='genres'&&!activeGenre)initGenres();
}
function goHome(){showPage('home')}

function initGenres(){
  const bar=document.getElementById('genre-bar');
  if(bar.children.length)return;
  GENRES_MOVIE.forEach(g=>{
    const ch=document.createElement('button');ch.className='genre-chip';
    ch.textContent=g.name;ch.onclick=()=>selectGenre(g.id,ch);
    bar.appendChild(ch);
  });
  // auto-select first
  selectGenre(GENRES_MOVIE[0].id,bar.children[0]);
}

async function selectGenre(id,el){
  document.querySelectorAll('.genre-chip').forEach(c=>c.classList.remove('active'));
  if(el)el.classList.add('active');
  activeGenre=id;genrePage=1;
  const grid=document.getElementById('genre-grid');grid.innerHTML='';
  await loadGenrePage();
}

async function loadGenrePage(){
  const data=await tmdb('/discover/movie',{with_genres:activeGenre,page:genrePage,sort_by:'popularity.desc'});
  const grid=document.getElementById('genre-grid');
  (data.results||[]).forEach(m=>{m.media_type='movie';grid.appendChild(makeCard(m))});
  document.getElementById('load-more-wrap').style.display=genrePage<(data.total_pages||1)?'':'none';
}

function loadMoreGenre(){genrePage++;loadGenrePage()}

function renderWL(){
  const wl=getWL();const grid=document.getElementById('wl-grid');
  const items=Object.values(wl).sort((a,b)=>b.ts-a.ts);
  grid.innerHTML='';document.getElementById('wl-cnt').textContent=items.length?`(${items.length})`:'';
  if(!items.length){document.getElementById('wl-empty').style.display='';return}
  document.getElementById('wl-empty').style.display='none';
  items.forEach(it=>grid.appendChild(makeCard(it,{removable:true,removeAction:`rmWL(${it.id},'${it._type||'movie'}')`})));
}
function renderHI(){
  const hi=getHI();const grid=document.getElementById('hi-grid');
  const items=Object.values(hi).sort((a,b)=>b.ts-a.ts);
  grid.innerHTML='';document.getElementById('hi-cnt').textContent=items.length?`(${items.length})`:'';
  if(!items.length){document.getElementById('hi-empty').style.display='';return}
  document.getElementById('hi-empty').style.display='none';
  items.forEach(it=>grid.appendChild(makeCard(it,{removable:true,removeAction:`rmHI(${it.id},'${it._type||'movie'}')`})));
}

// ── WATCHLIST ──
function toggleWatchlist(){
  if(!currentItem)return;
  const wl=getWL();const k=`${currentItem._type}_${currentItem.id}`;
  if(wl[k]){delete wl[k];ss('wl',wl);toast('Removed from watchlist')}
  else{wl[k]={...currentItem,ts:Date.now()};ss('wl',wl);toast('Added to watchlist ⭐')}
  updateWLBtn();
}
function rmWL(id,t){const wl=getWL();delete wl[`${t}_${id}`];ss('wl',wl);renderWL();toast('Removed')}
function rmHI(id,t){const hi=getHI();delete hi[`${t}_${id}`];ss('hi',hi);renderHI();toast('Removed')}
function updateWLBtn(){
  if(!currentItem)return;const wl=getWL();const k=`${currentItem._type}_${currentItem.id}`;
  const btn=document.getElementById('btn-wl');
  if(wl[k]){btn.textContent='✓ In Watchlist'}else{btn.textContent='⭐ Add to Watchlist'}
}
function addToHI(item){const hi=getHI();hi[`${item._type}_${item.id}`]={...item,ts:Date.now()};ss('hi',hi)}

// ── SHAREABLE LINKS ──
function applyHash(){
  const h=location.hash.slice(1);if(!h)return;
  const parts=h.split('/'); // movie/123 or tv/123
  if(parts.length>=2&&(parts[0]==='movie'||parts[0]==='tv')){
    const type=parts[0];const id=parseInt(parts[1]);
    if(!id)return;
    tmdb(`/${type}/${id}`).then(data=>{if(data.id){data.media_type=type;openPlayer(data,type)}});
  }
}
window.addEventListener('hashchange',applyHash);

function shareLink(){
  if(!currentItem)return;
  const url=location.origin+location.pathname+'#'+currentItem._type+'/'+currentItem.id;
  navigator.clipboard.writeText(url).then(()=>toast('Link copied! 🔗')).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');ta.remove();toast('Link copied! 🔗');
  });
}

// ── PLAYER ──
async function openPlayer(item,type){
  const t=type==='tv'?'tv':'movie';
  currentItem={
    id:item.id,_type:t,title:item.title||item.name,
    poster_path:item.poster_path,overview:item.overview||'',
    release_date:item.release_date||item.first_air_date||'',
    vote_average:item.vote_average,media_type:t,
  };
  location.hash=`${t}/${item.id}`;

  ['home','genres','watchlist','history'].forEach(k=>
    document.getElementById('page-'+k).style.display='none');
  document.getElementById('player-view').classList.add('show');

  document.getElementById('p-title').textContent=currentItem.title;
  document.getElementById('p-ov').textContent=currentItem.overview;
  const year=(currentItem.release_date||'').slice(0,4);
  const rating=currentItem.vote_average?'⭐ '+currentItem.vote_average.toFixed(1):'';
  document.getElementById('p-meta').innerHTML=
    `<span>${t==='tv'?'📺 TV Show':'🎬 Movie'}</span>`+
    (year?`<span>${year}</span>`:'')+
    (rating?`<span>${rating}</span>`:'');
  document.getElementById('p-poster').innerHTML=currentItem.poster_path
    ?`<img src="${IMG+currentItem.poster_path}">`:'';

  // Server buttons
  renderServerBar();
  updateWLBtn();addToHI(currentItem);

  if(t==='tv'){
    document.getElementById('tv-ctrl').style.display='flex';
    tvDetails=await tmdb(`/tv/${item.id}`);
    const seasons=(tvDetails.seasons||[]).filter(s=>s.season_number>0);
    const ss_el=document.getElementById('sel-s');
    ss_el.innerHTML=seasons.map(s=>`<option value="${s.season_number}">Season ${s.season_number} (${s.episode_count} ep)</option>`).join('');
    const prog=getIProg(item.id,'tv');
    if(prog&&prog.s){currentSeason=prog.s;currentEpisode=prog.e||1;ss_el.value=currentSeason}
    else{currentSeason=seasons[0]?.season_number||1;currentEpisode=1}
    await loadEps();loadStream();
  } else {
    document.getElementById('tv-ctrl').style.display='none';
    tvDetails=null;loadStream();
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderServerBar(){
  const bar=document.getElementById('server-bar');
  bar.innerHTML='<span>Server:</span>';
  SERVERS.forEach(srv=>{
    const b=document.createElement('button');
    b.className='server-btn'+(srv.id===currentServer.id?' active':'');
    b.textContent=srv.name;
    b.onclick=()=>{currentServer=srv;renderServerBar();loadStream()};
    bar.appendChild(b);
  });
}

function loadStream(){
  const t=currentItem._type;
  let src;
  if(t==='tv'){
    src=currentServer.tv(currentItem.id,currentSeason,currentEpisode);
  } else {
    const prog=getIProg(currentItem.id,'movie');
    const startTime=(prog&&prog.time)?Math.floor(prog.time):0;
    src=currentServer.movie(currentItem.id);
    // only vidking supports progress param
    if(currentServer.id==='vidking'&&startTime>0) src+='&progress='+startTime;
  }
  document.getElementById('p-iframe').src=src;
}

async function loadEps(){
  const data=await tmdb(`/tv/${currentItem.id}/season/${currentSeason}`);
  const sel=document.getElementById('sel-e');
  const eps=data.episodes||[];
  sel.innerHTML=eps.map(e=>`<option value="${e.episode_number}">Ep ${e.episode_number}: ${e.name||''}</option>`).join('');
  if(currentEpisode>eps.length)currentEpisode=1;
  sel.value=currentEpisode;
}
async function onSeasonChange(){currentSeason=parseInt(document.getElementById('sel-s').value);currentEpisode=1;await loadEps();loadStream()}
function onEpisodeChange(){currentEpisode=parseInt(document.getElementById('sel-e').value);loadStream()}

function closePlayer(){
  document.getElementById('p-iframe').src='';
  document.getElementById('player-view').classList.remove('show');
  location.hash='';showPage(prevPage||'home');
}

// ── SEARCH ──
const si=document.getElementById('si'),sd=document.getElementById('sd'),cl_b=document.getElementById('cl');
si.addEventListener('input',()=>{
  const q=si.value.trim();cl_b.style.display=q?'block':'none';
  clearTimeout(searchTimeout);
  if(q.length<2){sd.classList.remove('show');return}
  searchTimeout=setTimeout(async()=>{
    const data=await tmdb('/search/multi',{query:q,include_adult:'false'});
    const res=(data.results||[]).filter(r=>r.media_type==='movie'||r.media_type==='tv').slice(0,10);
    if(!res.length){sd.innerHTML='<div style="padding:14px;color:var(--text-dim);font-size:12px">No results</div>';sd.classList.add('show');return}
    sd.innerHTML=res.map(r=>{
      const title=r.title||r.name;const year=(r.release_date||r.first_air_date||'').slice(0,4);
      const poster=r.poster_path?`<img src="${IMG_SM+r.poster_path}">`:`<div class="nop">?</div>`;
      const badge=r.media_type==='tv'?'<span class="badge tv">TV</span>':'<span class="badge movie">Movie</span>';
      return`<div class="dd-item" onclick='pickR(${r.id},"${r.media_type}")'>${poster}<div class="inf"><div class="tt">${title}</div><div class="mt">${year}${r.vote_average?' · ⭐'+r.vote_average.toFixed(1):''}</div></div>${badge}</div>`;
    }).join('');sd.classList.add('show');
  },300);
});
si.addEventListener('focus',()=>{if(sd.innerHTML&&si.value.trim().length>=2)sd.classList.add('show')});
document.addEventListener('click',e=>{if(!e.target.closest('.search-box'))sd.classList.remove('show')});
async function pickR(id,type){sd.classList.remove('show');si.value='';cl_b.style.display='none';
  const data=await tmdb(`/${type}/${id}`);data.media_type=type;openPlayer(data,type)}
function clearSearch(){si.value='';cl_b.style.display='none';sd.classList.remove('show');si.focus()}

// ── RANDOM ──
let randItem=null;
function openRandomModal(){document.getElementById('rand-modal').classList.add('show');rollRandom()}
function closeRandomModal(){document.getElementById('rand-modal').classList.remove('show')}
async function rollRandom(){
  const rc=document.getElementById('rand-content');
  const ra=document.getElementById('rand-actions');
  rc.innerHTML='<div class="spinner"></div>';ra.style.display='none';
  const page=Math.floor(Math.random()*5)+1;
  const type=Math.random()>.4?'movie':'tv';
  const data=await tmdb(`/${type}/popular`,{page});
  const results=data.results||[];
  if(!results.length){rc.innerHTML='<p style="color:var(--text-dim)">Try again</p>';ra.style.display='flex';return}
  randItem=results[Math.floor(Math.random()*results.length)];
  randItem.media_type=type;
  const title=randItem.title||randItem.name;
  const year=(randItem.release_date||randItem.first_air_date||'').slice(0,4);
  const rating=randItem.vote_average?'⭐'+randItem.vote_average.toFixed(1):'';
  rc.innerHTML=`
    ${randItem.poster_path?`<div class="rand-poster"><img src="${IMG+randItem.poster_path}"></div>`:''}
    <div class="rand-title">${title}</div>
    <div class="rand-meta">${type==='tv'?'📺 TV':'🎬 Movie'} · ${year} ${rating}</div>`;
  ra.style.display='flex';
  document.getElementById('rand-watch').onclick=()=>{closeRandomModal();openPlayer(randItem,type)};
}

// ── PROGRESS LISTENER ──
window.addEventListener('message',e=>{
  try{
    const msg=typeof e.data==='string'?JSON.parse(e.data):e.data;
    if(msg.type==='PLAYER_EVENT'&&msg.data&&currentItem){
      const d=msg.data;
      const pct=d.progress||(d.duration?(d.currentTime/d.duration)*100:0);
      saveProg(currentItem.id,currentItem._type,pct,d.currentTime||0,
        currentItem._type==='tv'?currentSeason:null,
        currentItem._type==='tv'?currentEpisode:null);
    }
  }catch{}
});

// ── TOAST ──
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}

// ── INIT ──
async function init(){
  try{
    const[trending,movies,tv]=await Promise.all([
      tmdb('/trending/all/day'),tmdb('/movie/popular'),tmdb('/tv/popular')
    ]);
    const tr=document.getElementById('trending-row');
    (trending.results||[]).slice(0,20).forEach(i=>{
      if(i.media_type!=='movie'&&i.media_type!=='tv')return;
      tr.appendChild(makeCard(i));
    });
    const mg=document.getElementById('pop-movies');
    (movies.results||[]).slice(0,12).forEach(i=>{i.media_type='movie';mg.appendChild(makeCard(i))});
    const tg=document.getElementById('pop-tv');
    (tv.results||[]).slice(0,12).forEach(i=>{i.media_type='tv';tg.appendChild(makeCard(i))});
  }catch(err){console.error(err)}
  // check hash for deep link
  applyHash();
}
init();
</script>
